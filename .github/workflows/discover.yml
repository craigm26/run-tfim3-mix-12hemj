name: discover
# Auto-discovery: find run repos tagged `quantum-harness-run`, ingest their
# scoreboard-entry.json, re-verify every entry, and refresh the board. Scheduled +
# manual. Nothing is trusted — verify.py re-judges each entry against the canonical
# hidden references and checks the metric matches.
on:
  schedule:
    - cron: '17 */6 * * *'      # every 6 hours
  workflow_dispatch:
permissions:
  contents: write
jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      # The `secrets` context is not allowed inside `if:` expressions, so expose
      # a non-sensitive boolean here (job-level env DOES allow `secrets`) and gate
      # the deploy step on it. The token itself stays scoped to the deploy step.
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install numpy
      - name: Crawl tagged run repos
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scoreboard/discover.mjs
      - name: Re-verify every entry (seeds + discovered)
        run: python3 scoreboard/verify.py
      - name: Rebuild the board
        run: node scoreboard/build.mjs
      - name: Commit refreshed board if it changed
        run: |
          if ! git diff --quiet scoreboard/discovered.json viewer/scoreboard-data.js; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add scoreboard/discovered.json viewer/scoreboard-data.js
            git commit -m "scoreboard: auto-discovery refresh [skip ci]"
            git push
          else
            echo "no change"
          fi
      - name: Deploy to Cloudflare Pages (only if a token secret is configured)
        if: ${{ env.HAS_CF_TOKEN == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages deploy viewer --project-name quantum-harness --branch main --commit-dirty=true
