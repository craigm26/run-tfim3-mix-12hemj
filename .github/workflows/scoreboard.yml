name: scoreboard
# Merge gate + aggregator freshness. On every push/PR: re-verify the bench and every
# committed scoreboard entry, then fail if the generated board is stale. No bot commits —
# contributors regenerate locally (`node scoreboard/build.mjs`) and commit the data file.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # `secrets` is not allowed in `if:`, so expose a boolean here and gate on it.
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install judge deps (numpy only)
        run: pip install numpy
      - name: Measurement tests
        run: node --test test/*.test.mjs
      - name: Judge regression
        run: python3 bench/quantum-judge/test_judge.py
      - name: Re-verify scoreboard entries (judge ACCEPT on every committed bundle)
        run: python3 scoreboard/verify.py
      - name: Scoreboard data is fresh (entries.json -> viewer/scoreboard-data.js)
        run: node scoreboard/build.mjs --check
      # Auto-deploy on a green push to main — so every push lands a Cloudflare Pages
      # deployment (tagged with the commit) without a manual wrangler run. Skipped on
      # PRs and when no Cloudflare token secret is configured.
      - name: Deploy to Cloudflare Pages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_CF_TOKEN == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages deploy viewer --project-name quantum-harness --branch main --commit-dirty=true
