<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 · QuantumMytheme</title>
<meta name="robots" content="noindex" />
<style>
  :root{ --bg:#ffffff; --ink:#15171c; --ink-2:#3f4552; --faint:#727a89; --rule:#e2e5ec; --accent:#28489e;
    --serif:Georgia,"Times New Roman","DejaVu Serif",serif; --mono:ui-monospace,"Cascadia Code","DejaVu Sans Mono",monospace; }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);
    display:grid;place-items:center;padding:32px;line-height:1.5}
  .card{max-width:560px;border-left:4px solid var(--accent);padding:4px 0 4px 28px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:var(--faint);margin:0 0 18px}
  h1{font-size:84px;line-height:1;letter-spacing:-0.02em;margin:0;font-weight:700}
  h1 .ket{color:var(--accent)}
  .lead{font-size:21px;color:var(--ink-2);margin:18px 0 8px}
  .mono{font-family:var(--mono);font-size:13.5px;color:var(--faint);margin:0 0 26px}
  .links{display:flex;gap:22px;flex-wrap:wrap;font-family:var(--mono);font-size:14px}
  a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;padding-bottom:2px}
  a:hover{border-bottom-color:var(--accent)}
  @media (max-width:520px){ h1{font-size:60px} }
</style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Error &middot; 404 &middot; not found</p>
    <h1>4<span class="ket">0</span>4</h1>
    <p class="lead">This page collapsed to a state we don't have.</p>
    <p class="mono">measured &#10072;404&#10217; &mdash; zero amplitude on this branch of the site.</p>
    <nav class="links">
      <a href="/">&larr; Back to quantummytheme.com</a>
      <a href="/#scoreboard">View the scoreboard</a>
      <a href="/#run">Run your own</a>
    </nav>
  </main>
</body>
</html>
